<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup & Login</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100 justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4 p-4">
          <div class="text-center mb-4">
            <h2 id="form-title" class="fw-bold">Create Account</h2>
            <p class="text-muted mb-0">Signup and Login System</p>
          </div>

          <div id="message" class="alert d-none" role="alert"></div>

          <!-- Signup Form -->
          <form id="signup-form">
            <div class="mb-3">
              <label for="signup-name" class="form-label">Name</label>
              <input type="text" class="form-control" id="signup-name" placeholder="Enter your name" />
            </div>

            <div class="mb-3">
              <label for="signup-email" class="form-label">Email</label>
              <input type="email" class="form-control" id="signup-email" placeholder="Enter your email" />
            </div>

            <div class="mb-3">
              <label for="signup-phone" class="form-label">Phone Number</label>
              <input type="text" class="form-control" id="signup-phone" placeholder="Enter your phone number" />
            </div>

            <div class="mb-3">
              <label for="signup-password" class="form-label">Password</label>
              <input type="password" class="form-control" id="signup-password" placeholder="Enter your password" />
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-3">Sign Up</button>

            <p class="text-center mt-3 mb-0">
              Already have an account?
              <span id="show-login" class="toggle-link">Login</span>
            </p>
          </form>

          <!-- Login Form -->
          <form id="login-form" class="d-none">
            <div class="mb-3">
              <label for="login-identifier" class="form-label">Email or Phone Number</label>
              <input type="text" class="form-control" id="login-identifier" placeholder="Enter email or phone" />
            </div>

            <div class="mb-3">
              <label for="login-password" class="form-label">Password</label>
              <input type="password" class="form-control" id="login-password" placeholder="Enter your password" />
            </div>

            <button type="submit" class="btn btn-success w-100 rounded-3">Login</button>

            <p class="text-center mt-3 mb-0">
              Don't have an account?
              <span id="show-signup" class="toggle-link">Sign Up</span>
            </p>
          </form>

          <div id="profile-box" class="d-none mt-4">
            <div class="card border-0 bg-light rounded-4 p-3">
              <h5 class="fw-bold mb-3">User Profile</h5>
              <p class="mb-1"><strong>Name:</strong> <span id="profile-name"></span></p>
              <p class="mb-1"><strong>Email:</strong> <span id="profile-email"></span></p>
              <p class="mb-1"><strong>Phone:</strong> <span id="profile-phone"></span></p>
              <button id="logout-btn" class="btn btn-danger mt-3 rounded-3">Logout</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
