<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signup & Login</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100 justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5">

        <div class="card shadow-lg border-0 rounded-4 p-4">

          <!-- Title -->
          <div class="text-center mb-4">
            <h2 id="form-title" class="fw-bold">Create Account</h2>
            <p class="text-muted mb-0">Signup and Login System</p>
          </div>

          <!-- Message Box -->
          <div id="message" class="alert d-none" role="alert"></div>

          <!-- ================= SIGNUP FORM ================= -->
          <form id="signup-form" autocomplete="off">

            <div class="mb-3">
              <label for="signup-name" class="form-label">Name</label>
              <input
                type="text"
                class="form-control"
                id="signup-name"
                placeholder="Enter your name"
                autocomplete="off"
              />
            </div>

            <div class="mb-3">
              <label for="signup-email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="signup-email"
                placeholder="Enter your email"
                autocomplete="off"
              />
            </div>

            <div class="mb-3">
              <label for="signup-phone" class="form-label">Phone</label>
              <input
                type="text"
                class="form-control"
                id="signup-phone"
                placeholder="Enter your phone number"
                autocomplete="off"
              />
            </div>

            <div class="mb-3">
              <label for="signup-password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="signup-password"
                placeholder="Enter your password"
                autocomplete="new-password"
              />
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-3">
              Sign Up
            </button>

            <p class="text-center mt-3 mb-0">
              Already have an account?
              <span id="show-login" class="toggle-link">Login</span>
            </p>
          </form>

          <!-- ================= LOGIN FORM ================= -->
          <form id="login-form" class="d-none" autocomplete="off">

            <div class="mb-3">
              <label for="login-identifier" class="form-label">
                Email or Phone
              </label>
              <input
                type="text"
                class="form-control"
                id="login-identifier"
                placeholder="Enter email or phone"
                autocomplete="username"
              />
            </div>

            <div class="mb-3">
              <label for="login-password" class="form-label">
                Password
              </label>
              <input
                type="password"
                class="form-control"
                id="login-password"
                placeholder="Enter your password"
                autocomplete="current-password"
              />
            </div>

            <button type="submit" class="btn btn-success w-100 rounded-3">
              Login
            </button>

            <p class="text-center mt-3 mb-0">
              Don't have an account?
              <span id="show-signup" class="toggle-link">Sign Up</span>
            </p>
          </form>

        </div>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
