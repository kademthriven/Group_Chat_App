<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Chat</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="chat.css" />
</head>
<body>
  <div class="chat-app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h4 class="mb-0">Chats</h4>
      </div>

      <div class="chat-list">
        <div class="chat-item active">
          <div class="avatar">G</div>
          <div class="chat-info">
            <h6 class="mb-1">General Group</h6>
            <small>Last message preview...</small>
          </div>
        </div>

        <div class="chat-item">
          <div class="avatar">T</div>
          <div class="chat-info">
            <h6 class="mb-1">Team Chat</h6>
            <small>Project discussion...</small>
          </div>
        </div>
      </div>
    </aside>

    <main class="chat-window">
      <div class="chat-header">
        <div class="d-flex align-items-center gap-3">
          <div class="avatar large">G</div>
          <div>
            <h5 class="mb-0">General Group</h5>
            <small class="text-muted">12 members online</small>
          </div>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="date-divider">
          <span>Today</span>
        </div>

        <div class="message-row received">
          <div class="message-bubble">
            <div class="message-sender">Rahul</div>
            <div class="message-text">Hey everyone 👋</div>
            <div class="message-time">10:12 AM</div>
          </div>
        </div>

        <div class="message-row received">
          <div class="message-bubble">
            <div class="message-sender">Anjali</div>
            <div class="message-text">Let's finish the UI today.</div>
            <div class="message-time">10:13 AM</div>
          </div>
        </div>

        <div class="message-row sent">
          <div class="message-bubble">
            <div class="message-text">Done, I’m working on the chat window now.</div>
            <div class="message-time">10:14 AM</div>
          </div>
        </div>
      </div>

      <div class="chat-input-area">
        <form id="chatForm" class="chat-form">
          <input
            type="text"
            id="messageInput"
            class="form-control"
            placeholder="Type a message"
            autocomplete="off"
          />
          <button type="submit" class="btn btn-primary px-4">Send</button>
        </form>
      </div>
    </main>
  </div>

  <script src="chat.js"></script>
</body>
</html>
