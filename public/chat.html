<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="chat.css" />
</head>
<body>
  <div class="chat-shell">
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
  </div>

  <div class="chat-app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div>
          <p class="eyebrow mb-2">Workspace</p>
          <h4 class="mb-0">Pulse Chat</h4>
        </div>
        <div class="user-pill" id="sidebarUserPill">Guest</div>
      </div>

      <div class="sidebar-search">
        <div class="sidebar-stack">
          <div>
            <p class="sidebar-section-title">Create Group</p>
            <form id="groupCreateForm" class="personal-chat-form">
              <input
                type="text"
                id="groupNameInput"
                class="form-control"
                placeholder="Create a new group"
                autocomplete="off"
              />
              <button type="submit" class="btn btn-primary w-100 mt-3">Create Group</button>
            </form>
          </div>

          <div>
            <p class="sidebar-section-title">Join Group</p>
            <form id="groupJoinForm" class="personal-chat-form">
              <input
                type="text"
                id="groupCodeInput"
                class="form-control"
                placeholder="Enter group code"
                autocomplete="off"
              />
              <button type="submit" class="btn btn-outline-light w-100 mt-3">Join by Code</button>
            </form>
          </div>

          <div>
            <p class="sidebar-section-title">Direct Message</p>
            <form id="personalChatForm" class="personal-chat-form">
              <input
                type="email"
                id="roomEmailInput"
                class="form-control"
                placeholder="Enter user email to start a DM"
                autocomplete="off"
              />
              <button type="submit" class="btn btn-primary w-100 mt-3">Start DM</button>
            </form>
          </div>
        </div>
      </div>

      <div class="chat-list">
        <div class="chat-list-section">
          <p class="sidebar-section-title px-2">Groups</p>
          <div id="dynamicGroupChats"></div>
        </div>

        <div class="chat-list-section">
          <p class="sidebar-section-title px-2">Direct Messages</p>
          <div id="dynamicPersonalChats"></div>
        </div>
      </div>
    </aside>

    <main class="chat-window">
      <div class="chat-header">
        <div class="d-flex align-items-center gap-3">
          <div class="avatar large">G</div>
          <div>
            <h5 class="mb-0" id="chatTitle">General Group</h5>
            <small class="text-muted" id="chatSubtitle">Join a group conversation or start a DM</small>
          </div>
        </div>
        <div class="header-actions">
          <div class="presence-dot"></div>
          <span id="headerUserName">Guest</span>
          <button type="button" id="logoutButton" class="btn btn-light btn-sm">
            Logout
          </button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="date-divider">
          <span>Today</span>
        </div>

        <div class="message-row received">
          <div class="message-bubble">
            <div class="message-sender">Rahul</div>
            <div class="message-text">Hey everyone 👋</div>
            <div class="message-time">10:12 AM</div>
          </div>
        </div>

        <div class="message-row received">
          <div class="message-bubble">
            <div class="message-sender">Anjali</div>
            <div class="message-text">Let's finish the UI today.</div>
            <div class="message-time">10:13 AM</div>
          </div>
        </div>

        <div class="message-row sent">
          <div class="message-bubble">
            <div class="message-text">Done, I’m working on the chat window now.</div>
            <div class="message-time">10:14 AM</div>
          </div>
        </div>
      </div>

      <div class="chat-input-area">
        <form id="chatForm" class="chat-form">
          <label for="mediaInput" class="media-picker-btn" title="Share media">+</label>
          <input
            type="file"
            id="mediaInput"
            class="media-input"
            accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip"
          />
          <input
            type="text"
            id="messageInput"
            class="form-control"
            placeholder="Write a message"
            autocomplete="off"
          />
          <button type="submit" class="btn btn-primary px-4" id="sendButton">Send</button>
        </form>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="chat.js"></script>
</body>
</html>
